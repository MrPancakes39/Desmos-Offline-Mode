<!doctype html>
<html no_gl="true" lang="en" class="dcg-calculator-api-container">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desmos | Offline Mode</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./src/styles/main.less" />
  </head>

  <body>
    <!-- Desmos Assets -->
    <div id="desmos-assets-container">
      <link rel="stylesheet" href="%VITE_DESMOS_PROTOCOL%/calculator.css" />
      <link rel="stylesheet" href="%VITE_DESMOS_PROTOCOL%/loading.css" />
      <script src="%VITE_DESMOS_PROTOCOL%/preload_desmos.js"></script>
      <script src="%VITE_DESMOS_PROTOCOL%/locales.js"></script>
      <script src="%VITE_DESMOS_PROTOCOL%/calculator_api.js"></script>
    </div>

    <div class="dcg-loading-div-container">
      <div class="dcg-loading-background-div"></div>
      <div class="dcg-loading-div">Loading...</div>
    </div>

    <div id="root" class="dcg-sliding-interior">
      <div id="print-preview-container"></div>
      <div id="dcg-header-container"></div>
      <div id="calc-container">
        <div id="graph-container"></div>
        <div id="geometry-container"></div>
        <div id="calc3d-container"></div>
      </div>
    </div>
    <div id="side-bar-container"></div>

    <div id="dcg-modal-container"></div>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
